<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống LMS Tổng Hợp</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #e0f2fe 0%, #f1f5f9 100%);
            --primary-btn: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
            --secondary-btn: linear-gradient(135deg, #8b5cf6 0%, #d946ef 100%);
            --glass: rgba(255, 255, 255, 0.7);
            --text-main: #0f172a;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        /* Lớp bảo vệ mật khẩu */
        #auth-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-gradient);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .auth-card {
            background: var(--glass);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            border: 1px solid white;
            text-align: center;
            width: 320px;
        }

        .auth-card input {
            width: 100%;
            padding: 15px;
            margin: 20px 0;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            text-align: center;
            font-size: 1.2rem;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        .auth-card input:focus { border-color: #0ea5e9; }

        .btn-auth {
            background: var(--primary-btn);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 15px rgba(37, 99, 235, 0.2);
        }

        /* Dashboard chính */
        #main-app {
            display: none;
            width: 90%;
            max-width: 800px;
            text-align: center;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { font-weight: 800; font-size: 2rem; margin-bottom: 10px; }
        .sub-title { color: #64748b; margin-bottom: 40px; }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .menu-item {
            background: var(--glass);
            padding: 40px 20px;
            border-radius: 32px;
            text-decoration: none;
            color: var(--text-main);
            border: 1px solid white;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        .menu-item:hover {
            transform: scale(1.05);
            background: white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }

        .icon {
            font-size: 50px;
            margin-bottom: 20px;
            background: white;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .btn-action {
            margin-top: 20px;
            padding: 12px 30px;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .bg-blue { background: var(--primary-btn); }
        .bg-purple { background: var(--secondary-btn); }

        @media (max-width: 600px) {
            .menu-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <div style="font-size: 40px;">💎</div>
            <h2>LMS Control</h2>
            <p style="color: #64748b; font-size: 0.9rem;">Nhập mã Admin để mở khóa</p>
            <input type="password" id="pass" placeholder="••••••">
            <button class="btn-auth" onclick="unlock()">XÁC NHẬN</button>
        </div>
    </div>

    <div id="main-app">
        <h1>TRẠM ĐIỀU HÀNH TỔNG</h1>
        <p class="sub-title">Hệ thống giáo dục thông minh v6.0</p>

        <div class="menu-grid">
            <a href="https://ten-cua-ban.github.io/QUAN_TRI_MI_NI_LMS/" class="menu-item">
                <div class="icon">⚙️</div>
                <h3 style="margin:0">QUẢN TRỊ VIÊN</h3>
                <p style="font-size: 0.85rem; color: #64748b;">Chấm bài, xem báo cáo & cài đặt hệ thống</p>
                <div class="btn-action bg-blue">Vào quản lý ➔</div>
            </a>

            <a href="https://ten-cua-ban.github.io/mi_ni_lms/" class="menu-item">
                <div class="icon">📝</div>
                <h3 style="margin:0">CẬP NHẬT ĐỀ THI</h3>
                <p style="font-size: 0.85rem; color: #64748b;">Soạn đề mới & trải nghiệm giao diện học sinh</p>
                <div class="btn-action bg-purple">Vào thi thử ➔</div>
            </a>
        </div>
    </div>

    <script>
        function unlock() {
            const p = document.getElementById('pass').value;
            if(p === '172108') {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
            } else {
                alert('Mã không đúng!');
            }
        }
    </script>
</body>
</html>
